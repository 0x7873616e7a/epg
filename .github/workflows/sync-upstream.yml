name: Sync Upstream

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/iptv-org/epg.git || true
          git fetch upstream

      - name: Merge upstream
        run: git merge upstream/master --no-edit --strategy-option=theirs || true

      - name: Restore our workflow files
        run: |
          git checkout HEAD -- .github/workflows/sync-upstream.yml || true
          git checkout HEAD -- .github/workflows/grab-epg.yml || true

      - name: Push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync"
          else
            git commit -m "sync upstream [skip ci]"
            git push origin HEAD
          fi
